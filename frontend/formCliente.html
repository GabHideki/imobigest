<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Cliente</title>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="form.css">

</head>

<body>

    <!-- Modal -->
    <div class="modal" id="modalCliente">

        <div class="modal-container" id="modalContainerCliente">

            <button type="button" class="btn-fechar" id="btnFechar" aria-label="Fechar">
                <i class="bi bi-x-lg"></i>
            </button>

            <h1>Cadastro Cliente</h1>
            <hr>

            <form id="formCadastro">

                <div class="">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" name="nome" required>
                </div>

                <div class="">
                    <label for="cpf">CPF</label>
                    <input type="number" id="cpf" name="cpf" required>
                </div>

                <div class="">
                    <label for="telefone">Telefone</label>
                    <input type="number" id="tell" name="telefone" required>
                </div>

                <div class="">                
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="btn">
                    <button type="button" id="btnCancelar">Cancelar</button>
                    <button type="submit">Cadastrar</button>
                </div>

            </form>

        </div>

    </div>

    <script src="cadastroCliente.js"></script>

</body>

</html>
