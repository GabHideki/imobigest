<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Imóvel</title>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="form.css">
</head>

<body>

    <!-- Modal -->
    <div class="modal" id="modalImovel">

        <div class="modal-container">
            
                <h1>Cadastro Imóvel</h1>
                <hr>

            <div class="modal-conteudo">

                <button type="button" class="btn-fechar" id="btnFechar" aria-label="Fechar">
                    <i class="bi bi-x-lg"></i>
                </button>

                <form id="formCadastro">

                    <div class="campo">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" name="nome" required>
                    </div>

                    <div class="campo">
                        <label for="cep">CEP</label>
                        <input type="number" id="cep" name="cep" required>
                    </div>

                    <div class="campo">
                        <label for="estado">Estado</label>
                        <input type="text" id="estado" name="estado" required>
                    </div>

                    <div class="campo">
                        <label for="cidade">Cidade</label>
                        <input type="text" id="cidade" name="cidade" required>
                    </div>

                    <div class="campo">
                        <label for="bairro">Bairro</label>
                        <input type="text" id="bairro" name="bairro" required>
                    </div>

                    <div class="campo">
                        <label for="rua">Rua</label>
                        <input type="text" id="rua" name="rua" required>
                    </div>

                    <div class="campo">
                        <label for="numero">Número</label>
                        <input type="number" id="num" name="numero" required>
                    </div>

                    <div class="campo">
                        <label for="complemento">Complemento</label>
                        <input type="text" id="comple" name="complemento">
                    </div>
            
                    <div class="campo">
                        <label for="descricao">Descrição</label>
                        <input type="text" id="descricao" name="descricao" required>
                    </div>

                    <div class="campo">
                        <label for="status">Status</label>
                        <select id="status" name="status" required>
                            <option value="">Selecione</option>
                            <option value="disponivel">Disponível</option>
                            <option value="alugado">Alugado</option>
                            <option value="vendido">Vendido</option>
                        </select>
                    </div>

                    <div class="campo">
                        <label for="finalidade">Finalidade</label>
                        <select id="finalidade" name="finalidade" required>
                            <option value="">Selecione</option>
                            <option value="aluguel">Aluguel</option>
                            <option value="venda">Venda</option>
                            <option value="ambos">Ambos</option>
                        </select>
                    </div>

                    <!--Cada campo de valor está dentro de uma <div> para facilitar a manipulação pelo JavaScript.
                        - Aluguel: exibe apenas o campo de valor do aluguel.
                        - Venda: exibe apenas o campo de valor da venda.
                        - Ambos: exibe os dois campos.
                        O backend receberá normalmente os valores enviados pelo formulário.-->
                    <div class="campo" id="campoVenda" style="display: none;">
                        <label for="valorVenda">Valor de Venda</label>
                        <input type="number" id="valorVenda" name="valorVenda">
                    </div>

                    <div class="campo" id="campoAluguel" style="display: none;">
                        <label for="valorAluguel">Valor do Aluguel</label>
                        <input type="number" id="valorAluguel" name="valorAluguel">
                    </div>

                    <div class="btn">
                        <button type="submit">Cadastrar</button>
                    </div>

                </form>

            </div>

        </div>

    </div>

    <script src="cadastroImovel.js"></script>

</body>

</html>
