<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Contrato</title>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="form.css">
</head>

<body>

    <!-- Modal -->
    <div class="modal" id="modalCliente">

        <div class="modal-container">

            <h1>Cadastro Contrato</h1>

            <div class="modal-conteudo">

                <hr>
      
                <button type="button" class="btn-fechar" id="btnFechar" aria-label="Fechar">
                    <i class="bi bi-x-lg"></i>
                </button>

                <form id="formContrato">
                    <h2>Dados do Contrato</h2>

                    <div class="campo">
                        <label for="statusContrato">Status do Contrato</label>
                        <select id="statusContrato" name="statusContrato" required>
                            <option value="">Selecione</option>
                            <option value="Ativo">Ativo</option>
                            <option value="pendente">Inativo</option>
                            <option value="cancelado">Cancelado</option>
                        </select>
                    </div>

                    <div class="campo">
                        <label for="tipoContrato">Tipo do Contrato</label>
                        <select id="tipoContrato" name="tipoContrato" required>
                            <option value="">Selecione</option>
                            <option value="aluguel">Aluguel</option>
                            <option value="venda">Venda</option>
                        </select>
                    </div>

                    <div class="campo">
                        <label for="prazoContrato">Prazo do Contrato (meses)</label>
                        <input type="number" id="prazoContrato" name="prazoContrato" min="1" required>
                    </div>

                    <div class="campo">
                        <label for="dataInicio">Data/Início</label>
                        <input type="date" id="dataInicio" name="dataInicio" required>
                    </div>

                    <div class="campo">
                        <label for="dataFim">Data/Fim</label>
                        <input type="date" id="dataFim" name="dataFim" required>
                    </div>

                    <div class="campo">
                        <!-- O JavaScript deve buscar os clientes cadastrados na API Spring Boot e preencher este select. -->
                        <label for="clienteId">Cliente</label>
                        <select id="clienteId" name="clienteId" required>
                            <option value="">Selecione o cliente</option>
                        </select>
                    </div>

                    <div class="campo">
                        <!-- O JavaScript deve buscar os imóveis cadastrados na API Spring Boot e preencher este select. -->
                        <label for="imovelId">Imóvel</label>
                        <select id="imovelId" name="imovelId" required>
                            <option value="">Selecione o imóvel</option>
                        </select>
                    </div>

                    <div class="campo">
                        <!-- O corretor deve ser carregado automaticamente após a seleção do imóvel. O usuário apenas visualiza o corretor responsável. -->
                        <label for="corretorNome">Corretor Responsável</label>
                        <input type="text" id="corretorNome" readonly>
                    </div>

                    <!-- Também pode ser enviado o id do corretor -->
                    <input type="hidden" id="corretorId" name="corretorId">

                    <hr>

                    <h2>Dados do Pagamento</h2>
    
                    <div class="campo">
                        <label for="valorPagamento">Valor do Pagamento</label>
                        <input type="number" id="valorPagamento" name="valorPagamento" step="0.01" required>
                    </div>

                    <div class="campo">
                        <label for="dataPagamento">Data do Pagamento</label>
                        <input type="date" id="dataPagamento" name="dataPagamento" required>
                    </div>

                    <div class="campo">
                        <label for="tipoPagamento">Tipo do Pagamento</label>
                        <select id="tipoPagamento" name="tipoPagamento" required>
                            <option value="">Selecione</option>
                            <option value="pix">PIX</option>
                            <option value="boleto">Boleto</option>
                            <option value="cartao_credito">Cartão de Crédito</option>
                            <option value="cartao_debito">Cartão de Débito</option>
                            <option value="transferencia">Transferência Bancária</option>
                            <option value="dinheiro">Dinheiro</option>
                        </select>
                    </div>

                    <div class="campo">
                        <label for="statusPagamento">Status do Pagamento</label>
                        <select id="statusPagamento" name="statusPagamento" required>
                            <option value="">Selecione</option>
                            <option value="pendente">Pendente</option>
                            <option value="pago">Pago</option>
                            <option value="atrasado">Atrasado</option>
                            <option value="cancelado">Cancelado</option>
                        </select>
                    </div>

                    <div class="btn">
                        <button type="submit">Cadastrar</button>
                    </div>

                </form>

            </div>

        </div>

    </div>

    <script src="cadastroContrato.js"></script>

</body>
</html>
