<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

        <link rel="stylesheet" href="login.css">

</head>

<body>

    <main>
        <section class="card-login">
            <!-- Logo -->
            <div class="logo-login">
                <img src="img/logo.png" alt="Logo da Imobiliária">
            </div>

            <!-- Informações -->
            <div class="login-info">
                <h2>Bem-vindo!</h2>
                <p>Acesse sua conta para continuar.</p>
            </div>

            <!-- Formulário -->
            <form id="form-login">

                <!-- Campo de e-mail -->
                <div class="form-email">
                    <label for="email">E-mail</label>

                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="exemplo@gmail.com"
                        autocomplete="email"
                        required
                    >
                </div>

                <!-- Campo de senha -->
                <div class="form-password">
                    <label for="password">Senha</label>

                    <input 
                        type="password"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <!-- Recuperação de senha -->
                <div class="esqueceu-senha">
                    <a href="#" id="link-esqueceu-senha">
                        Esqueceu sua senha?
                    </a>
                </div>

                <!-- Mensagem de erro/sucesso -->
                <div id="mensagem-login"></div>

                <hr class="divider">

                <!-- Botão -->
                <button type="submit" id="btn-login" class="btn-submit">
                    Entrar
                </button>
            </form>
        </section>
    </main>

</body>
</html>
